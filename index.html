<!DOCTYPE html>
<html>
<head>
  <title>Grafik pH</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      text-align: center;
      font-family: Arial;
    }

    .container {
      width: 800px;
      margin: auto;
    }
  </style>
</head>

<body>

  <h2>Grafik pH Realtime</h2>

  <div class="container">
    <canvas id="chartPH"></canvas>
  </div>

  <p>pH Sekarang: <span id="phNow">-</span></p>

<script>
  const firebaseConfig = {
    databaseURL: "https://hidroponik-29d8c-default-rtdb.firebaseio.com/"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  let labels = [];
  let dataPH = [];

  const ctx = document.getElementById('chartPH').getContext('2d');

  const chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [{
        label: 'pH',
        data: dataPH,
        borderWidth: 4
      }]
    },
    options: {
      responsive: true,
      scales: {
        y: {
          min: 1,   // 🔥 batas bawah
          max: 14    // 🔥 batas atas (skala tetap)
        }
      }
    }
  });

  db.ref("iot_project/ph").on("value", (snapshot) => {
    let ph = snapshot.val();
    let time = new Date().toLocaleTimeString();

    document.getElementById("phNow").innerText = ph;

    if (labels.length > 10) {
      labels.shift();
      dataPH.shift();
    }

    labels.push(time);
    dataPH.push(ph);

    chart.update();
  });
</script>

</body>
</html>
